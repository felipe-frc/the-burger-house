name: CI (Front-end)

on:
  push:
    branches:
      - main
      - "fix/**"
      - "refactor/**"
      - "feature/**"
      - "chore/**"
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Testes unitários
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes unitários
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar build de produção
        run: npm run build

  e2e:
    name: Testes E2E
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar navegador do Playwright
        run: npx playwright install --with-deps chromium

      - name: Gerar CSS de produção
        run: npm run build

      - name: Subir servidor local para E2E
        run: nohup npm run serve:e2e > vite-e2e.log 2>&1 &

      - name: Aguardar servidor local
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          cat vite-e2e.log
          exit 1

      - name: Executar testes E2E
        run: npm run e2e:ci

      - name: Exibir log do servidor em caso de falha
        if: failure()
        run: cat vite-e2e.log
