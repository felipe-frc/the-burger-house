name: CI (Front-end)

on:
  push:
    branches:
      - main
      - "fix/**"
      - "refactor/**"
      - "feature/**"
      - "chore/**"
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Testes unitários
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes unitários
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar build de produção
        run: npm run build

  e2e:
    name: Testes E2E
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar navegador do Playwright
        run: npx playwright install --with-deps chromium

      - name: Executar testes E2E
        run: npm run e2e
